<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SESHA - Iniciar sesión</title>
  <!-- Bootstrap CSS (CDN + SRI) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="style/stylesheet.css">
  <link rel="icon" type="image/x-icon" href="assets/sesha-app.png">
</head>
<body>
<header>
  <nav>
    <div class="logo">
  <img src="assets/sesha-app.png" alt="SESHA logo" style="height:44px;vertical-align:middle;margin-right:.6rem;">
      SESHA
    </div>
    <div class="nav-links">
      <a href="register.html">Regístrate</a>
      <a href="landing.html">Inicio</a>
    </div>
  </nav>

<main>
  <section class="login-container">
    <h2>Iniciar sesión</h2>
    <form action="#" method="post" class="login-form" id="loginForm">
        <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input type="email" name="email" id="email" placeholder="tu@ejemplo.com" required />
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" name="password" id="password" placeholder="Contraseña" required />
        </div>
        <div id="loginError" role="alert" class="text-danger mt-2" style="min-height:1.2em;font-size:.95rem;"></div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:.5rem">
            <a href="#" style="font-size:.92rem;color:var(--primary-2);">¿Olvidaste tu contraseña?</a>
            <button type="submit" class="cta-button">Iniciar sesión</button>
        </div>
    </form>
  </section>
</main>
<!-- Bootstrap JS bundle (Popper + Bootstrap) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script>
    (function () {
        const form = document.getElementById('loginForm');
        const errorEl = document.getElementById('loginError');

        form.addEventListener('submit', function (e) {
            e.preventDefault();
            errorEl.textContent = '';
            if (!form.checkValidity()) {
                errorEl.textContent = 'Por favor completa los campos requeridos.';
                return;
            }
            // Enviar datos al servidor
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);

            fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('Login exitoso.');
                    // Aquí puedes redirigir a la página principal o dashboard
                    window.location.href = 'landing.html';
                } else {
                    errorEl.textContent = data.message;
                }
            })
            .catch(error => {
                errorEl.textContent = 'Error al iniciar sesión. Inténtalo de nuevo.';
                console.error('Error:', error);
            });
        }, false);
    })();
</script>
</body>
