<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SESHA - Iniciar sesión</title>
  <!-- Bootstrap CSS (CDN + SRI) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="style/stylesheet.css">
  <link rel="icon" type="image/x-icon" href="assets/sesha-app.png">
</head>
<body>
<header>
  <nav>
    <div class="logo">
  <img src="assets/sesha-app.png" alt="SESHA logo" style="height:44px;vertical-align:middle;margin-right:.6rem;">
      SESHA
    </div>
    <div class="nav-links">
      <a href="register.html">Regístrate</a>
      <a href="landing.html">Inicio</a>
    </div>
  </nav>

<main>
  <section class="login-container">
    <h2>Iniciar sesión</h2>
    <form action="#" method="post" class="login-form">
        <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input type="email" name="email" id="email" placeholder="tu@ejemplo.com" required />
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" name="password" id="password" placeholder="Contraseña" required />
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:.5rem">
            <a href="#" style="font-size:.92rem;color:var(--primary-2);">¿Olvidaste tu contraseña?</a>
            <button type="submit" class="cta-button">Iniciar sesión</button>
        </div>
    </form>
  </section>
</main>
<!-- Bootstrap JS bundle (Popper + Bootstrap) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
