<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro - SESHA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style/stylesheet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <section class="register-hero text-center py-4">
        <img src="assets/sesha-app.png" alt="SESHA APP" class="app-image img-fluid" style="max-width:320px; border-radius:12px; box-shadow:0 8px 24px rgba(0,0,0,0.12);">
    </section>

    <header>
        <nav class="navbar navbar-expand-lg navbar-light bg-light px-4">
            <div class="logo fw-bold">SESHA</div>
            <div class="ms-auto">
                <a href="landing.html" class="me-3 text-decoration-none">Inicio</a>
                <a href="landing.html#caracteristicas" class="me-3 text-decoration-none">Características</a>
                <a href="landing.html#contacto" class="text-decoration-none">Contacto</a>
            </div>
        </nav>
    </header>

    <main class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card shadow-sm">
                        <div class="card-body p-4">
                            <h2 class="text-center mb-2">Crea tu cuenta en SESHA</h2>
                            <p class="text-center text-muted mb-4">Regístrate para comenzar a gestionar tu empresa eficientemente.</p>

                            <form id="registerForm" novalidate>
                                <div class="row g-3">
                                    <div class="col-12">
                                        <label for="fullname" class="form-label">Nombre completo</label>
                                        <input id="fullname" name="fullname" type="text" class="form-control" required placeholder="Tu nombre completo">
                                    </div>

                                    <div class="col-12">
                                        <label for="company" class="form-label">Empresa (opcional)</label>
                                        <input id="company" name="company" type="text" class="form-control" placeholder="Nombre de la empresa">
                                    </div>

                                    <div class="col-12">
                                        <label for="email" class="form-label">Correo electrónico</label>
                                        <input id="email" name="email" type="email" class="form-control" required placeholder="tu@ejemplo.com">
                                    </div>

                                    <div class="col-md-6">
                                        <label for="password" class="form-label">Contraseña</label>
                                        <input id="password" name="password" type="password" class="form-control" required minlength="8" placeholder="Mínimo 8 caracteres">
                                    </div>
                                    <div class="col-md-6">
                                        <label for="confirm" class="form-label">Confirmar contraseña</label>
                                        <input id="confirm" name="confirm" type="password" class="form-control" required minlength="8" placeholder="Repite la contraseña">
                                    </div>

                                    <div class="col-12">
                                        <label for="role" class="form-label">Rol</label>
                                        <select id="role" name="role" class="form-select">
                                            <option value="admin">Administrador</option>
                                            <option value="manager">Gerente</option>
                                            <option value="staff">Colaborador</option>
                                        </select>
                                    </div>

                                    <div class="col-12">
                                        <div class="form-check">
                                            <input id="publicacion" name="publicacion" type="checkbox" class="form-check-input">
                                            <label for="publicacion" class="form-check-label">Permitir publicación de datos</label>
                                        </div>
                                    </div>

                                    <div class="col-12">
                                        <div class="form-check">
                                            <input id="terms" type="checkbox" class="form-check-input" required>
                                            <label for="terms" class="form-check-label">Acepto los términos y condiciones</label>
                                        </div>
                                    </div>

                                    <div id="formError" role="alert" class="text-danger mt-2" style="min-height:1.2em; font-size:.95rem;"></div>

                                    <div class="col-12">
                                        <button type="submit" class="btn btn-primary w-100 py-2">Crear cuenta</button>
                                    </div>

                                    <div class="col-12 text-center mt-3">
                                        <p class="small text-muted">¿Ya tienes cuenta? <a href="index.html" class="text-primary text-decoration-none">Inicia sesión</a></p>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer id="contacto" class="text-center py-4 bg-light border-top">
        <p class="mb-1">Contacta con nosotros: <a href="mailto:info@sesha.com">info@sesha.com</a></p>
        <p class="text-muted small">© 2025 SESHA. Todos los derechos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script>
        (function () {
            const form = document.getElementById('registerForm');
            const pwd = document.getElementById('password');
            const confirm = document.getElementById('confirm');
            const terms = document.getElementById('terms');
            const errorEl = document.getElementById('formError');

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                errorEl.textContent = '';

                if (!form.checkValidity()) {
                    errorEl.textContent = 'Por favor completa todos los campos requeridos.';
                    form.classList.add('was-validated');
                    return;
                }

                if (!terms.checked) {
                    errorEl.textContent = 'Debes aceptar los términos y condiciones.';
                    return;
                }

                if (pwd.value !== confirm.value) {
                    errorEl.textContent = 'Las contraseñas no coinciden.';
                    return;
                }

                // Preparar datos como JSON
                const formData = new FormData(form);
                const data = Object.fromEntries(formData);

                fetch('/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert('Registro exitoso.');
                        window.location.href = 'index.html';
                    } else {
                        errorEl.textContent = data.message || 'Error en el registro.';
                    }
                })
                .catch(err => {
                    errorEl.textContent = 'No se pudo conectar con el servidor.';
                });
            }, false);
        })();
    </script>
</body>
</html>
