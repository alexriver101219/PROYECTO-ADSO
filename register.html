<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro - SESHA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style/stylesheet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- React y Babel CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <section class="register-hero text-center py-4">
        <img src="assets/sesha-app.png" alt="SESHA APP" class="app-image img-fluid" style="max-width:320px; border-radius:12px; box-shadow:0 8px 24px rgba(0,0,0,0.12);">
    </section>

    <header>
        <nav class="navbar navbar-expand-lg navbar-light bg-light px-4">
            <div class="logo fw-bold">SESHA</div>
            <div class="ms-auto">
                <a href="landing.html" class="me-3 text-decoration-none">Inicio</a>
                <a href="landing.html#caracteristicas" class="me-3 text-decoration-none">Características</a>
                <a href="landing.html#contacto" class="text-decoration-none">Contacto</a>
            </div>
        </nav>
    </header>

    <main class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card shadow-sm">
                        <div class="card-body p-4">
                            <h2 class="text-center mb-2">Crea tu cuenta en SESHA</h2>
                            <p class="text-center text-muted mb-4">Regístrate para comenzar a gestionar tu empresa eficientemente.</p>

                            <form id="registerForm" novalidate>
                                <div class="row g-3">
                                    <div class="col-12">
                                        <label for="fullname" class="form-label">Nombre completo</label>
                                        <input id="fullname" name="fullname" type="text" class="form-control" required placeholder="Tu nombre completo">
                                    </div>

                                    <div class="col-12">
                                        <label for="company" class="form-label">Empresa (opcional)</label>
                                        <input id="company" name="company" type="text" class="form-control" placeholder="Nombre de la empresa">
                                    </div>

                                    <div class="col-12">
                                        <label for="email" class="form-label">Correo electrónico</label>
                                        <input id="email" name="email" type="email" class="form-control" required placeholder="tu@ejemplo.com">
                                    </div>

                                    <div class="col-md-6">
                                        <label for="password" class="form-label">Contraseña</label>
                                        <input id="password" name="password" type="password" class="form-control" required minlength="8" placeholder="Mínimo 8 caracteres">
                                    </div>
                                    <div class="col-md-6">
                                        <label for="confirm" class="form-label">Confirmar contraseña</label>
                                        <input id="confirm" name="confirm" type="password" class="form-control" required minlength="8" placeholder="Repite la contraseña">
                                    </div>

                                    <div class="col-12">
                                        <label for="role" class="form-label">Rol</label>
                                        <select id="role" name="role" class="form-select">
                                            <option value="admin">Administrador</option>
                                            <option value="manager">Gerente</option>
                                            <option value="staff">Colaborador</option>
                                        </select>
                                    </div>

                                    <div class="col-12">
                                        <div class="form-check">
                                            <input id="publicacion" name="publicacion" type="checkbox" class="form-check-input">
                                            <label for="publicacion" class="form-check-label">Permitir publicación de datos</label>
                                        </div>
                                    </div>

                                    <div class="col-12">
                                        <div class="form-check">
                                            <input id="terms" type="checkbox" class="form-check-input" required>
                                            <label for="terms" class="form-check-label">Acepto los términos y condiciones</label>
                                        </div>
                                    </div>

                                    <div id="formError" role="alert" class="text-danger mt-2" style="min-height:1.2em; font-size:.95rem;"></div>

                                    <div class="col-12">
                                        <button type="submit" class="btn btn-primary w-100 py-2">Crear cuenta</button>
                                    </div>

                                    <div class="col-12 text-center mt-3">
                                        <p class="small text-muted">¿Ya tienes cuenta? <a href="index.html" class="text-primary text-decoration-none">Inicia sesión</a></p>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <section class="react-register-container py-4">
        <div class="container">
            <div id="reactRegisterRoot"></div>
        </div>
    </section>

    <footer id="contacto" class="text-center py-4 bg-light border-top">
        <p class="mb-1">Contacta con nosotros: <a href="mailto:info@sesha.com">info@sesha.com</a></p>
        <p class="text-muted small">© 2025 SESHA. Todos los derechos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script>
        (function () {
            const form = document.getElementById('registerForm');
            const pwd = document.getElementById('password');
            const confirm = document.getElementById('confirm');
            const terms = document.getElementById('terms');
            const errorEl = document.getElementById('formError');

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                errorEl.textContent = '';

                if (!form.checkValidity()) {
                    errorEl.textContent = 'Por favor completa todos los campos requeridos.';
                    form.classList.add('was-validated');
                    return;
                }

                if (!terms.checked) {
                    errorEl.textContent = 'Debes aceptar los términos y condiciones.';
                    return;
                }

                if (pwd.value !== confirm.value) {
                    errorEl.textContent = 'Las contraseñas no coinciden.';
                    return;
                }

                // Preparar datos como JSON
                const formData = new FormData(form);
                const data = Object.fromEntries(formData);

                fetch('/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert('Registro exitoso.');
                        window.location.href = 'index.html';
                    } else {
                        errorEl.textContent = data.message || 'Error en el registro.';
                    }
                })
                .catch(err => {
                    errorEl.textContent = 'No se pudo conectar con el servidor.';
                });
            }, false);
        })();
    </script>

    <script type="text/babel">
      const { useState } = React;

      function ReactRegister() {
        const [fullname, setFullname] = useState('');
        const [email, setEmail] = useState('');
        const [password, setPassword] = useState('');
        const [confirm, setConfirm] = useState('');
        const [role, setRole] = useState('admin');
        const [message, setMessage] = useState('');
        const [status, setStatus] = useState('');

        const submit = async (e) => {
          e.preventDefault();
          setMessage('');
          setStatus('');

          if (!fullname || !email || !password || !confirm) {
            setMessage('Por favor completa todos los campos obligatorios');
            setStatus('error');
            return;
          }
          if (password !== confirm) {
            setMessage('Las contraseñas no coinciden');
            setStatus('error');
            return;
          }

          const payload = { fullname, email, password, role };

          try {
            const resp = await fetch('/register', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            });
            const data = await resp.json();
            if (data.success) {
              setMessage('Registro React exitoso. Redirigiendo...');
              setStatus('success');
              setTimeout(() => window.location.href = 'index.html', 1000);
            } else {
              setMessage(data.message || 'Error de registro');
              setStatus('error');
            }
          } catch (err) {
            setMessage('Error de red. Intenta de nuevo');
            setStatus('error');
          }
        };

        return (
          <div className="card shadow-sm">
            <div className="card-body p-4">
              <h3 className="text-center">Registro con React</h3>
              <form onSubmit={submit} className="mt-3">
                <div className="mb-3">
                  <label className="form-label">Nombre completo</label>
                  <input className="form-control" value={fullname} onChange={e => setFullname(e.target.value)} required />
                </div>
                <div className="mb-3">
                  <label className="form-label">Correo</label>
                  <input className="form-control" type="email" value={email} onChange={e => setEmail(e.target.value)} required />
                </div>
                <div className="mb-3">
                  <label className="form-label">Contraseña</label>
                  <input className="form-control" type="password" value={password} onChange={e => setPassword(e.target.value)} required minLength={8} />
                </div>
                <div className="mb-3">
                  <label className="form-label">Confirmar contraseña</label>
                  <input className="form-control" type="password" value={confirm} onChange={e => setConfirm(e.target.value)} required minLength={8} />
                </div>
                <div className="mb-3">
                  <label className="form-label">Rol</label>
                  <select className="form-select" value={role} onChange={e => setRole(e.target.value)}>
                    <option value="admin">Administrador</option>
                    <option value="manager">Gerente</option>
                    <option value="staff">Colaborador</option>
                  </select>
                </div>
                {message && <div className={`alert ${status === 'success' ? 'alert-success' : 'alert-danger'}`} role="alert">{message}</div>}
                <button type="submit" className="btn btn-success w-100">Registrar con React</button>
              </form>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('reactRegisterRoot'));
      root.render(<ReactRegister />);
    </script>
</body>
</html>
