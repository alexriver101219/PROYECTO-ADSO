<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SESHA - Login (alternativo)</title>
    <!-- Bootstrap CSS (CDN + SRI) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style/stylesheet.css">
    <meta name="description" content="Página de inicio de sesión alternativa para SESHA">
</head>
<body>
    <header>
        <nav>
            <div class="logo">SESHA</div>
            <div class="nav-links">
                <a href="register.html">Regístrate</a>
                <a href="landing.html">Inicio</a>
            </div>
        </nav>
    </header>

    <main class="center-vh">
        <div class="card register-card" style="max-width:420px;margin:2rem auto;padding:1.5rem;">
            <h2 class="text-center mb-4">Iniciar sesión</h2>
            <form action="#" method="post" id="loginForm">
                <div class="mb-3">
                    <label for="email" class="form-label">Correo electrónico</label>
                    <input id="email" name="email" type="email" class="form-control" required placeholder="tu@ejemplo.com">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input id="password" name="password" type="password" class="form-control" required placeholder="Contraseña">
                </div>
                <div id="loginError" role="alert" class="text-danger mt-2" style="min-height:1.2em;font-size:.95rem;"></div>
                <div class="d-flex justify-content-between align-items-center">
                    <a href="#" class="small text-primary">¿Olvidaste tu contraseña?</a>
                    <button type="submit" class="btn btn-primary">Entrar</button>
                </div>
            </form>
        </div>
    </main>
</body>
<!-- Bootstrap JS bundle (Popper + Bootstrap) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script>
    (function () {
        const form = document.getElementById('loginForm');
        const errorEl = document.getElementById('loginError');

        form.addEventListener('submit', function (e) {
            e.preventDefault();
            errorEl.textContent = '';
            if (!form.checkValidity()) {
                errorEl.textContent = 'Por favor completa los campos requeridos.';
                return;
            }
            // Enviar datos al servidor
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);

            fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('Login exitoso.');
                    window.location.href = 'landing.html';
                } else {
                    errorEl.textContent = data.message;
                }
            })
            .catch(error => {
                errorEl.textContent = 'Error al iniciar sesión. Inténtalo de nuevo.';
                console.error('Error:', error);
            });
        }, false);
    })();
</script>
</html>
