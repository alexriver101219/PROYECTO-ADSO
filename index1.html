<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SESHA - Login (alternativo)</title>
    <!-- Bootstrap CSS (CDN + SRI) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style/stylesheet.css">
    <meta name="description" content="Página de inicio de sesión alternativa para SESHA">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <header>
        <nav>
            <div class="logo">SESHA</div>
            <div class="nav-links">
                <a href="register.html">Regístrate</a>
                <a href="landing.html">Inicio</a>
            </div>
        </nav>
    </header>

    <main class="center-vh">
        <div class="card register-card" style="max-width:420px;margin:2rem auto;padding:1.5rem;">
            <h2 class="text-center mb-4">Iniciar sesión</h2>
            <form action="#" method="post" id="loginForm">
            <div id="reactIndex1LoginRoot" class="mt-3"></div>
            <hr />
            <p class="text-center text-muted">Formulario clásico abajo (sin React)</p>
                <div class="mb-3">
                    <label for="email" class="form-label">Correo electrónico</label>
                    <input id="email" name="email" type="email" class="form-control" required placeholder="tu@ejemplo.com">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input id="password" name="password" type="password" class="form-control" required placeholder="Contraseña">
                </div>
                <div id="loginError" role="alert" class="text-danger mt-2" style="min-height:1.2em;font-size:.95rem;"></div>
                <div class="d-flex justify-content-between align-items-center">
                    <a href="#" class="small text-primary">¿Olvidaste tu contraseña?</a>
                    <button type="submit" class="btn btn-primary">Entrar</button>
                </div>
            </form>
        </div>
    </main>
</body>
<!-- Bootstrap JS bundle (Popper + Bootstrap) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script>
    (function () {
        const form = document.getElementById('loginForm');
        const errorEl = document.getElementById('loginError');

        form.addEventListener('submit', function (e) {
            e.preventDefault();
            errorEl.textContent = '';
            if (!form.checkValidity()) {
                errorEl.textContent = 'Por favor completa los campos requeridos.';
                return;
            }
            // Enviar datos al servidor
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);

            fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('Login exitoso.');
                    window.location.href = 'landing.html';
                } else {
                    errorEl.textContent = data.message;
                }
            })
            .catch(error => {
                errorEl.textContent = 'Error al iniciar sesión. Inténtalo de nuevo.';
                console.error('Error:', error);
            });
        }, false);
    })();
</script>

<script type="text/babel">
  const { useState } = React;

  function ReactIndex1Login() {
    const [email, setEmail] = useState('');
    const [password, setPassword] = useState('');
    const [message, setMessage] = useState('');
    const [status, setStatus] = useState('');

    const submit = async (e) => {
      e.preventDefault();
      if (!email || !password) {
        setMessage('Todos los campos son obligatorios');
        setStatus('error');
        return;
      }

      try {
        const resp = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await resp.json();
        if (data.success) {
          setMessage('Login React exitoso - redirigiendo');
          setStatus('success');
          setTimeout(() => window.location.href = 'landing.html', 700);
        } else {
          setMessage(data.message || 'Credenciales inválidas');
          setStatus('error');
        }
      } catch (err) {
        setMessage('Error de conexión');
        setStatus('error');
      }
    };

    return (
      <div className="card shadow-sm mb-4">
        <div className="card-body p-4">
          <h3>React Login (index1)</h3>
          <form onSubmit={submit}>
            <div className="mb-3">
              <label className="form-label">Correo electrónico</label>
              <input className="form-control" type="email" value={email} onChange={e => setEmail(e.target.value)} required />
            </div>
            <div className="mb-3">
              <label className="form-label">Contraseña</label>
              <input className="form-control" type="password" value={password} onChange={e => setPassword(e.target.value)} required />
            </div>
            {message && <div className={`alert ${status === 'success' ? 'alert-success' : 'alert-danger'}`}>{message}</div>}
            <button className="btn btn-primary w-100" type="submit">Iniciar con React</button>
          </form>
        </div>
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('reactIndex1LoginRoot'));
  root.render(<ReactIndex1Login />);
</script>
</html>
