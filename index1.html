<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SESHA - Login (alternativo)</title>
    <!-- Bootstrap CSS (CDN + SRI) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style/stylesheet.css">
    <meta name="description" content="Página de inicio de sesión alternativa para SESHA">
</head>
<body>
    <header>
        <nav>
            <div class="logo">SESHA</div>
            <div class="nav-links">
                <a href="register.html">Regístrate</a>
                <a href="landing.html">Inicio</a>
            </div>
        </nav>
    </header>

    <main class="center-vh">
        <div class="card register-card" style="max-width:420px;margin:2rem auto;padding:1.5rem;">
            <h2 class="text-center mb-4">Iniciar sesión</h2>
            <form action="#" method="post">
                <div class="mb-3">
                    <label for="email" class="form-label">Correo electrónico</label>
                    <input id="email" name="email" type="email" class="form-control" required placeholder="tu@ejemplo.com">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input id="password" name="password" type="password" class="form-control" required placeholder="Contraseña">
                </div>
                <div class="d-flex justify-content-between align-items-center">
                    <a href="#" class="small text-primary">¿Olvidaste tu contraseña?</a>
                    <button type="submit" class="btn btn-primary">Entrar</button>
                </div>
            </form>
        </div>
    </main>
</body>
<!-- Bootstrap JS bundle (Popper + Bootstrap) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
